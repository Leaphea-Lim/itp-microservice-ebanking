
server:
  port: 9999

spring:
  application:
    name: gateway-server
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888

  data:
    redis:
      host: localhost
      port: 6379
      password: qwer

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

          httpclient:
            connect-timeout: 1000
            response-timeout: 5s

          routes:
            - id: pipeline
              uri: lb://pipeline
              predicates:
                - Path=/pipeline/**
              filters:
                - RewritePath=/pipeline/(?<segment>.*), /${segment}
                 # todo: CircuitBreaker Pattern
#                - name: CircuitBreaker
#                  args:
#                    name: pipelineCircuitBreaker
#                    fallbackUri: forward:/fallback/pipeline/client/accounts/secured

                # todo: Retry Pattern
#                - name: Retry
#                  args:
#                    retries: 5
#                    statuses: BAD_GATEWAY
#                    methods: GET
#                    backoff:
#                      firstBackoff: 10ms
#                      maxBackoff: 50ms
#                      factor: 2
#                      basedOnPreviousValue: false
                # todo: Rate-Limiter Pattern
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1


            - id: account
              uri: lb://account
              predicates:
                - Path=/account/**

              filters:
                - RewritePath=/account/(?<segment>.*), /${segment}
#                - name: CircuitBreaker
#                  args:
#                    name: accountCircuitBreaker
#                    fallbackUri: forward:/fallback/account
#                    statusCode:
#                      - 500
#                      - 404

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090

      client:
        provider:
          itp-standard:
            issuer-uri: http://localhost:9090
        registration:
          itp-standard:
            provider: itp-standard
            client-id: itp-standard
            client-secret: qwerqwer
            redirect-uri: http://localhost:9999/login/oauth2/code/itp-standard
            authorization-grant-type:
              - authorization_code
            scope:
              - openid # Auto issue access token
              - profile # Get profile
              - email # Get email

#Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 2 #number of request
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000

#Acuator
management:
  endpoints:
    web:
      exposure:
        include: "*"